<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CODE CLUB - AI Mandala Art Generator</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <div class="logo-container">
      <span class="logo-badge">DEVELOPED BY CODE CLUB</span>
      <h1>Mandala Art Generator</h1>
      <h2>Craft unique symmetrical art with AI</h2>
    </div>

    <div class="prompt-container">
      <div class="input-group">
        <span class="input-icon">
          <i class="fas fa-magic"></i>
        </span>
        <input type="text" id="prompt" class="form-control"
          placeholder="Enter your concept (e.g., butterfly, rangoli, lotus...)" required>
      </div>

      <!-- Style chips — 4 options matching the CSS nth-child rules -->
      <div class="options-row">
        <div class="option-chip">Monochrome</div>
        <div class="option-chip">Colorful</div>
        <div class="option-chip">Geometric</div>
        <div class="option-chip">Floral</div>
      </div>

      <button id="generateBtn">
        <i class="fas fa-magic"></i>
        Generate Mandala
      </button>
    </div>

    <div class="results-container">
      <div id="loadingText" class="d-none">
        <div class="spinner"></div>
        Creating your mandala...
      </div>

      <img id="resultImage" src="" alt="Generated Mandala" class="d-none">

      <div class="actions-row d-none" id="actionButtons">
        <div class="action-btn" id="downloadBtn">
          <i class="fas fa-download"></i>
          Download
        </div>
        <div class="action-btn" id="shareBtn">
          <i class="fas fa-share-alt"></i>
          Share
        </div>
        <div class="action-btn" id="regenerateBtn">
          <i class="fas fa-redo-alt"></i>
          Regenerate
        </div>
      </div>

      <div id="analysis" class="d-none"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
